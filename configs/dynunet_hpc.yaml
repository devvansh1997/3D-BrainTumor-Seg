model: dynunet

data:
  data_dir: /lustre/fs1/home/de807845/med_img_computing/datasets/Brats/Task01_BrainTumour/
  data_format: msd
  train_val_test_split: [0.70, 0.15, 0.15]

training:
  patch_size: [128, 128, 128]
  batch_size: 2
  max_epochs: 300
  val_interval: 5
  learning_rate: 1.0e-3
  weight_decay: 1.0e-5
  boundary_loss_weight: 0.5   # DiceCE + 0.5 × HausdorffDT
  cache_rate: 1.0
  num_workers: 8
  sw_batch_size: 4

model_params:
  in_channels: 4
  out_channels: 4
  kernels:
    - [3, 3, 3]
    - [3, 3, 3]
    - [3, 3, 3]
    - [3, 3, 3]
    - [3, 3, 3]
  strides:
    - [1, 1, 1]
    - [2, 2, 2]
    - [2, 2, 2]
    - [2, 2, 2]
    - [2, 2, 2]
  deep_supervision: true
  deep_supr_num: 2

output:
  checkpoint_dir: results/checkpoints
  log_dir: results/logs/dynunet

debug:
  enabled: false
  num_samples: 4
  max_epochs: 3
  patch_size: [64, 64, 64]
  batch_size: 1
  val_interval: 1
  cache_rate: 0.0
  num_workers: 0
  sw_batch_size: 1
  deep_supervision: false
