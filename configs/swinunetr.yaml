model: swinunetr

data:
  data_dir: data/raw
  train_val_test_split: [0.70, 0.15, 0.15]

training:
  patch_size: [128, 128, 128]
  batch_size: 1              # SwinUNETR is memory-heavy; bump to 2 on HPC
  max_epochs: 300
  val_interval: 5
  learning_rate: 1.0e-4
  weight_decay: 1.0e-5
  cache_rate: 1.0
  num_workers: 4
  sw_batch_size: 2

model_params:
  in_channels: 4
  out_channels: 4
  feature_size: 48           # SwinUNETR embedding dim
  use_checkpoint: true       # gradient checkpointing — saves GPU memory

output:
  checkpoint_dir: results/checkpoints
  log_dir: results/logs/swinunetr

# ---------- debug overrides ----------
debug:
  enabled: false
  num_samples: 4
  max_epochs: 3
  patch_size: [64, 64, 64]  # SwinUNETR requires patch divisible by 32
  batch_size: 1
  val_interval: 1
  cache_rate: 0.0
  num_workers: 0
  sw_batch_size: 1
  feature_size: 24           # smaller embedding for debug
